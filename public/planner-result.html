<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FUKUOSAKA — 플래너 결과</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #F5F0E8;
      --card:        #FFFFFF;
      --ink:         #1C1C1E;
      --ink-light:   #48484A;
      --muted:       #8E8E93;
      --border:      #E8E3DA;
      --cream-dark:  #EDE6D8;
      --accent:      #7B5EA7;
      --accent-pale: rgba(123,94,167,.10);
      --accent-glow: rgba(123,94,167,.28);
      --primary:     #2d5040;
      --green:       #3d7a54;
      --green-pale:  rgba(61,122,84,.10);
      --sky:         #4A7FA5;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
    #app { max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg); }

    /* ── Sticky header ─────────────────────────── */
    .res-header {
      position:sticky; top:0; z-index:50; background:var(--ink);
      padding:48px 20px 16px;
    }
    .res-hdr-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
    .res-back {
      width:36px; height:36px; border-radius:50%;
      background:rgba(255,255,255,.12); border:none; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; cursor:pointer; flex-shrink:0; transition:all .15s;
    }
    .res-back:hover { background:rgba(255,255,255,.22); }
    .res-title-wrap { flex:1; padding:0 12px; }
    .res-eyebrow { font-size:10px; font-weight:800; letter-spacing:.16em; color:var(--accent); margin-bottom:4px; }
    .res-trip    { font-size:20px; font-weight:900; color:#fff; letter-spacing:-.04em; }
    .res-detail  { font-size:12px; color:#EDE6D8; margin-top:2px; }
    .edit-btn {
      padding:7px 14px; border-radius:999px;
      background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);
      color:#fff; font-family:inherit; font-size:12px; font-weight:700;
      cursor:pointer; white-space:nowrap; transition:all .15s; flex-shrink:0;
    }
    .edit-btn:hover { background:rgba(255,255,255,.24); }

    /* Tab bar */
    .res-tabs { display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
    .res-tabs::-webkit-scrollbar { display:none; }
    .res-tab {
      padding:6px 14px; border-radius:20px; flex-shrink:0;
      background:rgba(255,255,255,.12); border:none;
      color:rgba(255,255,255,.65); font-family:inherit; font-size:12px; font-weight:700;
      cursor:pointer; transition:all .15s;
    }
    .res-tab.on { background:var(--accent); color:#fff; }

    /* ── Condition chips ───────────────────────── */
    .chip-bar {
      background:var(--card); padding:12px 16px;
      border-bottom:1px solid var(--border);
      display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;
    }
    .chip-bar::-webkit-scrollbar { display:none; }
    .cchip {
      flex-shrink:0; padding:4px 12px; border-radius:999px;
      background:var(--cream-dark); font-size:12px; font-weight:600; color:var(--ink-light);
    }

    /* ── Section ───────────────────────────────── */
    .sec { padding:24px 16px 8px; }
    .sec-hdr { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .sec-ico  { font-size:20px; }
    .sec-name { font-size:17px; font-weight:800; color:var(--ink); letter-spacing:-.03em; }
    .sec-sub  { font-size:11px; color:var(--muted); margin-left:auto; }


    /* ── Flight cards ──────────────────────────── */
    .flight-card {
      background:var(--card); margin:0 16px 12px; border-radius:16px;
      padding:16px; box-shadow:0 1px 8px rgba(28,28,30,.06);
      cursor:pointer; transition:transform .2s, box-shadow .2s; text-decoration:none; display:block;
    }
    .flight-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(28,28,30,.10); }
    .flight-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .flight-airline { font-size:14px; font-weight:700; color:var(--ink); }
    .flight-badges  { display:flex; gap:5px; margin-top:4px; }
    .flight-badge {
      font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px;
    }
    .badge-cheap   { background:var(--accent-pale); color:var(--accent); }
    .badge-direct  { background:var(--green-pale); color:var(--green); }
    .badge-stop    { background:rgba(184,150,46,.12); color:#8a6e10; }
    .flight-price  { font-size:18px; font-weight:900; color:var(--accent); }
    .flight-price-sub { font-size:10px; color:var(--muted); text-align:right; }
    .flight-leg { display:flex; align-items:center; gap:8px; }
    .fl-time { font-size:16px; font-weight:800; color:var(--ink); }
    .fl-line { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .fl-dur  { font-size:10px; color:var(--muted); }
    .fl-hr   { width:100%; height:1px; background:var(--border); position:relative; }
    .fl-hr::after { content:'›'; position:absolute; right:-4px; top:-8px; font-size:14px; color:var(--border); }
    .fl-date { font-size:11px; color:var(--muted); }
    .fl-sep  { margin:10px 0; border-top:1px dashed var(--border); }

    .flight-book {
      display:block; width:100%; margin-top:12px; padding:10px;
      border-radius:10px; background:var(--accent); color:#fff; border:none;
      font-family:inherit; font-size:13px; font-weight:800; cursor:pointer;
      text-align:center; text-decoration:none; transition:all .15s;
    }
    .flight-book:hover { background:#6a4f93; }

    /* ── Hotel / Tour cards ────────────────────── */
    .prod-card {
      background:var(--card); margin:0 16px 12px; border-radius:16px;
      padding:14px; box-shadow:0 1px 8px rgba(28,28,30,.06);
      display:flex; gap:14px; align-items:flex-start;
      cursor:pointer; transition:transform .2s, box-shadow .2s;
    }
    .prod-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(28,28,30,.10); }
    .prod-img {
      width:80px; height:80px; border-radius:12px; object-fit:cover;
      background:var(--cream-dark); flex-shrink:0;
    }
    .prod-ph {
      width:80px; height:80px; border-radius:12px;
      background:linear-gradient(135deg,var(--cream-dark),var(--border));
      display:flex; align-items:center; justify-content:center;
      font-size:28px; flex-shrink:0;
    }
    .prod-info { flex:1; min-width:0; }
    .prod-tag  {
      display:inline-block; font-size:10px; font-weight:800;
      padding:2px 8px; border-radius:999px;
      background:var(--accent-pale); color:var(--accent);
      margin-bottom:5px;
    }
    .prod-name  { font-size:13px; font-weight:700; color:var(--ink); line-height:1.4; margin-bottom:4px; }
    .prod-stars { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .prod-foot  { display:flex; align-items:center; justify-content:space-between; }
    .prod-price { font-size:15px; font-weight:900; color:var(--accent); }
    .prod-btn   {
      padding:7px 14px; border-radius:999px;
      background:var(--accent); color:#fff; border:none;
      font-family:inherit; font-size:12px; font-weight:800;
      cursor:pointer; white-space:nowrap; transition:all .15s;
      text-decoration:none;
    }
    .prod-btn:hover { background:#6a4f93; }

    /* ── Coupon card ───────────────────────────── */
    .coupon-wrap { padding:0 16px 12px; }
    .coupon-card {
      border-radius:16px; background:linear-gradient(135deg,#1a3a5c,#0d2137);
      padding:18px; display:flex; align-items:center; gap:14px;
      cursor:pointer; text-decoration:none; transition:transform .2s; position:relative; overflow:hidden;
    }
    .coupon-card::before { content:''; position:absolute; top:-16px; right:-16px; width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,.06); }
    .coupon-card:hover { transform:translateY(-2px); }
    .coupon-ico   { width:46px; height:46px; border-radius:12px; background:rgba(255,255,255,.14); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .coupon-body  { flex:1; }
    .coupon-ptnr  { font-size:10px; font-weight:800; letter-spacing:.08em; color:rgba(255,255,255,.55); margin-bottom:3px; }
    .coupon-title { font-size:14px; font-weight:800; color:#fff; letter-spacing:-.02em; line-height:1.35; margin-bottom:2px; }
    .coupon-desc  { font-size:11px; color:rgba(255,255,255,.68); }
    .coupon-cta   { flex-shrink:0; padding:7px 12px; border-radius:999px; background:#fff; color:#1a3a5c; border:none; font-family:inherit; font-size:11px; font-weight:800; cursor:pointer; white-space:nowrap; }

    /* ── Cost summary ──────────────────────────── */
    .cost-card {
      background:var(--card); margin:0 16px 16px; border-radius:20px;
      padding:20px; box-shadow:0 2px 12px rgba(28,28,30,.06);
    }
    .cost-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .cost-row:last-of-type { border-bottom:none; }
    .cost-lbl { font-size:14px; font-weight:600; color:var(--ink-light); display:flex; align-items:center; gap:6px; }
    .cost-val { font-size:14px; font-weight:700; color:var(--ink); }
    .cost-total { margin-top:14px; padding-top:14px; border-top:2px solid var(--ink); display:flex; justify-content:space-between; align-items:center; }
    .cost-total-lbl { font-size:16px; font-weight:800; color:var(--ink); }
    .cost-total-val { font-size:22px; font-weight:900; color:var(--accent); }

    /* ── Skeleton ──────────────────────────────── */
    .ske { background:linear-gradient(90deg,var(--cream-dark) 25%,var(--cream-dark)50%,var(--cream-dark) 75%); border-radius:8px; animation:shimmer 1.5s infinite; background-size:200% 100%; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Loading overlay ───────────────────────── */
    #page-loading {
      position:fixed; inset:0; z-index:200; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      max-width:430px; margin:0 auto;
    }
    .page-spinner { width:40px; height:40px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .page-loading-txt { font-size:14px; font-weight:700; color:var(--muted); }
    .page-loading-sub { font-size:12px; color:var(--muted); }

    /* ── Empty state ───────────────────────────── */
    .empty-card { margin:0 16px 12px; padding:24px; background:var(--card); border-radius:16px; text-align:center; color:var(--muted); font-size:13px; }

    /* ── More button ───────────────────────────── */
    .more-btn {
      display:block; margin:0 16px 16px; padding:13px;
      border-radius:12px; border:1.5px solid var(--border); background:var(--card);
      font-family:inherit; font-size:14px; font-weight:700; color:var(--ink-light);
      cursor:pointer; text-align:center; text-decoration:none; transition:all .15s;
    }
    .more-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── Bottom nav ────────────────────────────── */
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:430px; background:rgba(255,255,255,.95);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-top:1px solid var(--border); padding:10px 0 24px; z-index:100;
      display:flex; justify-content:space-around;
    }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:4px 16px; border-radius:12px; transition:all .15s; }
    .nav-item.on { background:var(--accent-pale); }
    .nav-icon { font-size:20px; }
    .nav-lbl  { font-size:10px; font-weight:700; color:var(--muted); }
    .nav-item.on .nav-lbl { color:var(--accent); }
    .bottom-space { height:80px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Loading overlay (shown while fetching) -->
  <div id="page-loading">
    <div class="page-spinner"></div>
    <div class="page-loading-txt">플랜 데이터 불러오는 중...</div>
    <div class="page-loading-sub">마이리얼트립 실시간 조회 중</div>
  </div>

  <!-- ── Sticky header ─────────────────────────── -->
  <div class="res-header">
    <div class="res-hdr-top">
      <button class="res-back" onclick="window.location.href='/main-home.html'">←</button>
      <div class="res-title-wrap">
        <div class="res-eyebrow">✦ FUKUOSAKA PLAN</div>
        <div class="res-trip" id="hdr-trip">플랜 로딩 중...</div>
        <div class="res-detail" id="hdr-detail"></div>
      </div>
      <button class="edit-btn" onclick="editPlan()">수정하기</button>
    </div>
    <div class="res-tabs">
      <button class="res-tab on"  onclick="scrollTo('sec-flight')">항공</button>
      <button class="res-tab"     onclick="scrollTo('sec-hotel')">숙소</button>
      <button class="res-tab"     onclick="scrollTo('sec-tour')">투어</button>
      <button class="res-tab"     onclick="scrollTo('sec-cost')">예상비용</button>
    </div>
  </div>

  <!-- ── Condition chips ─────────────────────────── -->
  <div class="chip-bar" id="chip-bar"></div>

  <!-- ── Page content (rendered after fetch) ──────── -->
  <div id="page-content" style="display:none">

    <!-- 항공권 -->
    <div class="sec" id="sec-flight">
      <div class="sec-hdr">
        <span class="sec-ico">✈️</span>
        <span class="sec-name">추천 항공권</span>
        <span class="sec-sub" id="flight-sub"></span>
      </div>
    </div>
    <div id="flight-list"></div>
    <a href="https://www.myrealtrip.com/flights" target="_blank" class="more-btn">마이리얼트립에서 더 보기 →</a>

    <!-- 추천 숙소 -->
    <div class="sec" id="sec-hotel">
      <div class="sec-hdr">
        <span class="sec-ico">🏨</span>
        <span class="sec-name">추천 숙소</span>
        <span class="sec-sub">마이리얼트립 실시간 데이터</span>
      </div>
    </div>
    <div id="hotel-list"></div>
    <!-- 여기어때 쿠폰 -->
    <div class="coupon-wrap">
      <a href="https://www.yeogieottae.com" target="_blank" class="coupon-card">
        <div class="coupon-ico">🎟</div>
        <div class="coupon-body">
          <div class="coupon-ptnr">여기어때 AFFILIATE · 예약 전 혜택 확인</div>
          <div class="coupon-title">쿠폰 받고 숙박 예약하면<br>최대 1만원 추가 할인</div>
          <div class="coupon-desc">제휴 쿠폰 페이지로 이동 후 즉시 적용</div>
        </div>
        <button class="coupon-cta">할인 확인</button>
      </a>
    </div>
    <a href="https://www.myrealtrip.com/stays" target="_blank" class="more-btn">숙소 더 보기 →</a>

    <!-- 투어 & 티켓 -->
    <div class="sec" id="sec-tour">
      <div class="sec-hdr">
        <span class="sec-ico">🎟</span>
        <span class="sec-name">투어 &amp; 티켓</span>
        <span class="sec-sub">현지 인기 액티비티</span>
      </div>
    </div>
    <div id="tour-list"></div>
    <a href="https://www.myrealtrip.com/offers" target="_blank" class="more-btn">투어 더 보기 →</a>

    <!-- 예상 비용 -->
    <div class="sec" id="sec-cost">
      <div class="sec-hdr">
        <span class="sec-ico">💰</span>
        <span class="sec-name">예상 총 비용</span>
      </div>
    </div>
    <div class="cost-card" id="cost-card"></div>

    <div class="bottom-space"></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/main-home.html'">
      <div class="nav-icon">🏠</div><div class="nav-lbl">홈</div>
    </div>
    <div class="nav-item on">
      <div class="nav-icon">✦</div><div class="nav-lbl">AI플래너</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/main-home.html'">
      <div class="nav-icon">🏨</div><div class="nav-lbl">숙소</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/main-home.html'">
      <div class="nav-icon">🎟</div><div class="nav-lbl">투어</div>
    </div>
  </nav>

</div><!-- #app -->

<script>
// ═══ READ CONDITIONS ══════════════════════════
const P = {};
(function readConditions(){
  // 1. URL params
  const sp = new URLSearchParams(window.location.search);
  ['cityCode','date','nights','origin','adults','children','budget','visitCount','returnDate'].forEach(k => {
    if(sp.get(k)) P[k] = sp.get(k);
  });
  // 2. sessionStorage (overrides URL)
  try {
    const saved = JSON.parse(sessionStorage.getItem('plannerConditions') || '{}');
    Object.assign(P, saved);
  } catch(e){}
  // 3. Defaults
  if(!P.cityCode)   P.cityCode   = 'KIX';
  if(!P.date)       P.date       = futureDate(45);
  if(!P.nights)     P.nights     = 3;
  if(!P.adults)     P.adults     = 2;
  if(!P.budget)     P.budget     = 1200000;
  if(!P.visitCount) P.visitCount = 'first';
  if(!P.styles)     P.styles     = [];
  if(!P.packages)   P.packages   = ['flight','hotel','tour'];
  if(!P.origin)     P.origin     = 'ICN';
  P.nights  = +P.nights;
  P.adults  = +P.adults;
  P.budget  = +P.budget;
})();

function futureDate(d){ const dt=new Date(); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }

// ═══ HELPERS ═════════════════════════════════
const CITY_NAME = { KIX:'오사카', FUK:'후쿠오카' };
const ORIGIN_NAME = { ICN:'인천', GMP:'김포', PUS:'김해(부산)', CJU:'제주' };
const VISIT_NAME  = { first:'첫방문', second:'재방문', many:'3회+' };
const STYLE_NAME  = { healing:'힐링', food:'먹방', shopping:'쇼핑', local:'로컬', family:'가족', night:'야경' };

// ═══ RENDER HEADER ═══════════════════════════
(function renderHeader(){
  const city   = CITY_NAME[P.cityCode] || P.cityCode;
  const origin = ORIGIN_NAME[P.origin] || P.origin;
  document.getElementById('hdr-trip').textContent   = `${city} ${P.nights}박${P.nights+1}일`;
  document.getElementById('hdr-detail').textContent = `${P.adults}인 · ${origin} 출발 · ${(+P.budget).toLocaleString()}원`;

  // Condition chips
  const chips = [
    city,
    `${P.nights}박${P.nights+1}일`,
    VISIT_NAME[P.visitCount] || '',
    ...(Array.isArray(P.styles) ? P.styles.map(s=>STYLE_NAME[s]||s) : []),
  ].filter(Boolean);
  document.getElementById('chip-bar').innerHTML =
    chips.map(c=>`<span class="cchip">${c}</span>`).join('');
})();

// ═══ RENDER COST SUMMARY ═════════════════════
function parsePrice(s){
  // "93,190원/박", "12,000원~" 등에서 숫자만 추출 (원 단위)
  const m = String(s||'').replace(/,/g,'').match(/\d+/);
  return m ? +m[0] : 0;
}

function fmtMan(won){ return won ? `약 ${Math.round(won/10000)}만원` : '—'; }

function renderCost(flights, stays, tnas){
  const pkgs = Array.isArray(P.packages) ? P.packages : ['flight','hotel','tour'];
  const hasF = pkgs.includes('flight');
  const hasH = pkgs.includes('hotel');
  const hasT = pkgs.includes('tour');

  // 실제 데이터 우선, 없으면 예산 비율 추정
  const flightAmt = hasF ? (flights[0]?.price || Math.round(P.budget * 0.35)) : 0;
  const hotelAmt  = hasH ? (stays[0] ? parsePrice(stays[0].price) * P.nights : Math.round(P.budget * 0.38)) : 0;
  const tourAmt   = hasT ? (tnas.slice(0,2).reduce((s,t)=>s+parsePrice(t.price),0) || Math.round(P.budget * 0.15)) : 0;
  const localAmt  = Math.round(P.budget * 0.12);

  const rows = [
    hasF ? `<div class="cost-row"><span class="cost-lbl">✈️ 항공권</span><span class="cost-val">${fmtMan(flightAmt)}</span></div>` : '',
    hasH ? `<div class="cost-row"><span class="cost-lbl">🏨 숙소 (${P.nights}박)</span><span class="cost-val">${fmtMan(hotelAmt)}</span></div>` : '',
    hasT ? `<div class="cost-row"><span class="cost-lbl">🎟 투어</span><span class="cost-val">${fmtMan(tourAmt)}</span></div>` : '',
    `<div class="cost-row"><span class="cost-lbl">🧾 현지비</span><span class="cost-val">${fmtMan(localAmt)}</span></div>`,
  ].filter(Boolean);

  const totalEst = flightAmt + hotelAmt + tourAmt + localAmt;
  document.getElementById('cost-card').innerHTML =
    rows.join('') +
    `<div class="cost-total"><span class="cost-total-lbl">예상 총 비용</span><span class="cost-total-val">약 ${Math.round(totalEst/10000)}만원</span></div>`;
}

// ═══ RENDER FLIGHTS ═══════════════════════════
function renderFlights(flights){
  const el = document.getElementById('flight-list');
  const sub = document.getElementById('flight-sub');
  if(!flights.length){
    el.innerHTML = `<div class="empty-card">항공 데이터를 불러오지 못했어요<br><small>마이리얼트립에서 직접 검색해보세요</small></div>`;
    return;
  }
  sub.textContent = `${ORIGIN_NAME[P.origin]||P.origin} → ${CITY_NAME[P.cityCode]||P.cityCode}`;
  el.innerHTML = flights.map(f=>{
    const o   = f.outbound;
    const ret = f.inbound;
    const dur = o ? `${Math.floor(o.duration/60)}h${o.duration%60>0?o.duration%60+'m':''}` : '';
    const cheapBadge  = f.isCheapest ? `<span class="flight-badge badge-cheap">최저가</span>` : '';
    const directBadge = f.isDirect
      ? `<span class="flight-badge badge-direct">직항</span>`
      : `<span class="flight-badge badge-stop">경유</span>`;
    const retRow = ret ? `<div class="fl-sep"></div>
      <div class="flight-leg">
        <span class="fl-date">${ret.date}</span>
        <span class="fl-time">${ret.departTime}</span>
        <div class="fl-line"><div class="fl-hr"></div><div class="fl-dur">${Math.floor(ret.duration/60)}h${ret.duration%60>0?ret.duration%60+'m':''}</div></div>
        <span class="fl-time">${ret.arriveTime}</span>
        <span class="fl-date">${ret.origin}→${ret.destination}</span>
      </div>` : '';
    const url = (f.reservationUrl||'https://www.myrealtrip.com/flights').replace(/"/g,'&quot;');
    return `<a class="flight-card" href="${url}" target="_blank">
      <div class="flight-top">
        <div>
          <div class="flight-airline">${f.airline}</div>
          <div class="flight-badges">${cheapBadge}${directBadge}</div>
        </div>
        <div>
          <div class="flight-price">${f.price?f.price.toLocaleString()+'원':''}</div>
          <div class="flight-price-sub">왕복 총액</div>
        </div>
      </div>
      <div class="flight-leg">
        <span class="fl-date">${o?.date||''}</span>
        <span class="fl-time">${o?.departTime||''}</span>
        <div class="fl-line"><div class="fl-hr"></div><div class="fl-dur">${dur}</div></div>
        <span class="fl-time">${o?.arriveTime||''}</span>
        <span class="fl-date">${o?.origin||''}→${o?.destination||''}</span>
      </div>
      ${retRow}
      <div class="flight-book">예약하기 →</div>
    </a>`;
  }).join('');
}

// ═══ RENDER HOTELS ════════════════════════════
function renderHotels(stays){
  const el = document.getElementById('hotel-list');
  if(!stays.length){
    el.innerHTML = `<div class="empty-card">숙소 데이터를 불러오지 못했어요</div>`;
    return;
  }
  el.innerHTML = stays.map(s=>{
    const url = (s.bookUrl||'https://www.myrealtrip.com/stays').replace(/"/g,'&quot;');
    const imgH = s.img
      ? `<img class="prod-img" src="${s.img.replace(/"/g,'&quot;')}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="prod-ph" style="display:none">🏨</div>`
      : `<div class="prod-ph">🏨</div>`;
    return `<div class="prod-card" onclick="window.open('${url}','_blank')">
      ${imgH}
      <div class="prod-info">
        <div class="prod-name">${s.name||'추천 숙소'}</div>
        ${s.rating?`<div class="prod-stars">⭐ ${s.rating} (${s.reviewCount||''})</div>`:''}
        <div class="prod-foot">
          <div class="prod-price">${s.price||''}</div>
          <a href="${url}" target="_blank" class="prod-btn">예약하기</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══ RENDER TOURS ═════════════════════════════
function renderTours(tnas){
  const el = document.getElementById('tour-list');
  if(!tnas.length){
    el.innerHTML = `<div class="empty-card">투어 데이터를 불러오지 못했어요</div>`;
    return;
  }
  el.innerHTML = tnas.map(t=>{
    const url  = (t.bookUrl||'https://www.myrealtrip.com/offers').replace(/"/g,'&quot;');
    const imgH = t.img
      ? `<img class="prod-img" src="${t.img.replace(/"/g,'&quot;')}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="prod-ph" style="display:none">🎟</div>`
      : `<div class="prod-ph">🎟</div>`;
    const tagH = t.tag ? `<div class="prod-tag">${t.tag}</div>` : '';
    return `<div class="prod-card" onclick="window.open('${url}','_blank')">
      ${imgH}
      <div class="prod-info">
        ${tagH}
        <div class="prod-name">${t.name||'추천 투어'}</div>
        ${t.rating?`<div class="prod-stars">⭐ ${t.rating}</div>`:''}
        <div class="prod-foot">
          <div class="prod-price">${t.price||''}</div>
          <a href="${url}" target="_blank" class="prod-btn">예약하기</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══ SCROLL TO SECTION ════════════════════════
function scrollTo(id){
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  document.querySelectorAll('.res-tab').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('onclick').includes(id));
  });
}

// ═══ EDIT PLAN ════════════════════════════════
function editPlan(){
  // plannerConditions already in sessionStorage — wizard will pre-fill
  window.location.href = '/planner-wizard.html';
}

// ═══ FETCH & RENDER ═══════════════════════════
async function fetchAndRender(){
  try {
    const params = new URLSearchParams({
      cityCode: P.cityCode,
      date:     P.date,
      nights:   String(P.nights),
      origin:   P.origin,
    });
    const res  = await fetch(`/api/planner?${params}`);
    const data = await res.json();

    const flights = data.flights || [];
    const stays   = data.stays   || [];
    const tnas    = data.tnas    || [];

    renderFlights(flights);
    renderHotels(stays);
    renderTours(tnas);
    renderCost(flights, stays, tnas);

    // Hide loading, show content
    document.getElementById('page-loading').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';
  } catch(e){
    document.getElementById('page-loading').innerHTML =
      `<div style="text-align:center;padding:32px">
         <div style="font-size:32px;margin-bottom:12px">⚠️</div>
         <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px">데이터를 불러오지 못했어요</div>
         <div style="font-size:13px;color:var(--muted);margin-bottom:20px">${e.message || '네트워크 오류'}</div>
         <button onclick="fetchAndRender()" style="padding:12px 24px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">다시 시도</button>
       </div>`;
  }
}

// Boot
fetchAndRender();
</script>
