<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FUKUOSAKA — 항공권 검색결과</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #F5F0E8;
      --card:        #FFFFFF;
      --ink:         #1C1C1E;
      --ink-light:   #48484A;
      --muted:       #8E8E93;
      --border:      #E8E3DA;
      --cream-dark:  #EDE6D8;
      --accent:      #7B5EA7;
      --accent-pale: rgba(123,94,167,.10);
      --green:       #2d6a4f;
      --green-pale:  rgba(45,106,79,.10);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
    #app { max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg); }

    /* ── Header ───────────────────────────────── */
    .flt-header {
      position:sticky; top:0; z-index:50; background:var(--ink);
      padding:48px 20px 16px;
    }
    .flt-hdr-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
    .flt-back {
      width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.12);
      border:none; color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:18px; cursor:pointer; flex-shrink:0; transition:all .15s;
    }
    .flt-back:hover { background:rgba(255,255,255,.22); }
    .flt-route { font-size:20px; font-weight:900; color:#fff; letter-spacing:-.04em; }
    .flt-dates { font-size:12px; color:rgba(255,255,255,.7); margin-top:3px; }
    .flt-edit  {
      margin-left:auto; flex-shrink:0; padding:7px 14px; border-radius:999px;
      background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);
      color:#fff; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer;
    }
    .flt-edit:hover { background:rgba(255,255,255,.24); }

    /* ── Sort bar ─────────────────────────────── */
    .sort-bar {
      background:var(--card); padding:10px 16px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .sort-count { font-size:12px; font-weight:700; color:var(--muted); }
    .sort-chips { display:flex; gap:6px; }
    .sort-chip {
      padding:5px 12px; border-radius:999px; border:1.5px solid var(--border);
      background:#fff; font-family:inherit; font-size:12px; font-weight:700;
      color:var(--ink-light); cursor:pointer; transition:all .15s;
    }
    .sort-chip.on { border-color:var(--accent); background:var(--accent-pale); color:var(--accent); }

    /* ── Loading ──────────────────────────────── */
    #page-loading {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; padding:80px 0;
    }
    .spinner { width:36px; height:36px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-txt { font-size:14px; font-weight:700; color:var(--muted); }
    .loading-sub { font-size:12px; color:var(--muted); }

    /* ── Flight card ──────────────────────────── */
    .flight-item {
      background:var(--card); margin:8px 12px;
      border-radius:16px; overflow:hidden;
      box-shadow:0 1px 8px rgba(28,28,30,.07);
      transition:transform .2s, box-shadow .2s;
    }
    .flight-item:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(28,28,30,.12); }
    .flight-item-inner { padding:0; }

    /* top bar: airline + price */
    .fi-top {
      display:flex; align-items:center; padding:14px 16px 10px;
      border-bottom:1px solid var(--border); gap:10px;
    }
    .airline-logo {
      width:36px; height:36px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:800; color:#fff;
    }
    .airline-name { font-size:14px; font-weight:700; color:var(--ink); flex:1; }
    .fi-badges { display:flex; gap:4px; }
    .badge {
      font-size:10px; font-weight:800; padding:2px 7px; border-radius:999px;
    }
    .badge-cheap  { background:var(--accent-pale); color:var(--accent); }
    .badge-direct { background:var(--green-pale); color:var(--green); }
    .badge-stop   { background:rgba(184,150,46,.12); color:#8a6e10; }
    .fi-price-wrap { text-align:right; }
    .fi-price { font-size:17px; font-weight:900; color:var(--accent); }
    .fi-price-sub { font-size:10px; color:var(--muted); }

    /* leg rows */
    .fi-legs { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
    .leg-row { display:flex; align-items:center; gap:0; }
    .leg-times { display:flex; align-items:center; gap:6px; min-width:0; }
    .leg-time { font-size:15px; font-weight:800; color:var(--ink); white-space:nowrap; }
    .leg-line-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; margin:0 8px; }
    .leg-line { width:100%; height:1px; background:var(--border); position:relative; }
    .leg-line::after { content:'›'; position:absolute; right:-5px; top:-9px; font-size:14px; color:var(--muted); }
    .leg-dur { font-size:10px; color:var(--muted); white-space:nowrap; }
    .leg-info { display:flex; align-items:center; gap:6px; margin-left:8px; flex-shrink:0; }
    .leg-airport { font-size:11px; font-weight:700; color:var(--muted); }
    .leg-sep { border-top:1px dashed var(--border); margin:0 16px; }

    /* book button */
    .fi-book {
      margin:0 16px 14px; display:block; padding:11px;
      border-radius:10px; background:var(--green); color:#fff; border:none;
      font-family:inherit; font-size:14px; font-weight:800; cursor:pointer;
      text-align:center; text-decoration:none; transition:all .15s;
    }
    .fi-book:hover { background:#235c3f; }

    /* ── More / Empty ─────────────────────────── */
    .more-btn {
      display:block; margin:8px 12px 16px; padding:14px;
      border-radius:14px; border:1.5px solid var(--border); background:var(--card);
      font-family:inherit; font-size:14px; font-weight:700; color:var(--ink-light);
      cursor:pointer; text-align:center; text-decoration:none; transition:all .15s;
    }
    .more-btn:hover { border-color:var(--accent); color:var(--accent); }
    .empty-card { margin:24px 12px; padding:32px; background:var(--card); border-radius:16px; text-align:center; }
    .bottom-space { height:32px; }

    /* ── Bottom nav ───────────────────────────── */
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:430px; background:rgba(255,255,255,.95);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-top:1px solid var(--border); padding:10px 0 24px; z-index:100;
      display:flex; justify-content:space-around;
    }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:4px 16px; border-radius:12px; transition:all .15s; }
    .nav-item.on { background:var(--accent-pale); }
    .nav-icon { font-size:20px; }
    .nav-lbl  { font-size:10px; font-weight:700; color:var(--muted); }
    .nav-item.on .nav-lbl { color:var(--accent); }
    .nav-space { height:80px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Sticky header -->
  <div class="flt-header">
    <div class="flt-hdr-top">
      <button class="flt-back" onclick="history.back()">←</button>
      <div style="flex:1">
        <div class="flt-route" id="hdr-route">항공권 검색</div>
        <div class="flt-dates" id="hdr-dates"></div>
      </div>
      <button class="flt-edit" onclick="history.back()">조건 변경</button>
    </div>
  </div>

  <!-- Sort bar -->
  <div class="sort-bar">
    <div class="sort-count" id="sort-count">검색 중...</div>
    <div class="sort-chips">
      <button class="sort-chip on" id="sort-price" onclick="sortFlights('price')">가격 낮은순</button>
      <button class="sort-chip"    id="sort-time"  onclick="sortFlights('time')">출발시간순</button>
    </div>
  </div>

  <!-- Content -->
  <div id="page-content">
    <div id="page-loading">
      <div class="spinner"></div>
      <div class="loading-txt">항공권 검색 중...</div>
      <div class="loading-sub">마이리얼트립 실시간 조회</div>
    </div>
    <div id="flight-list" style="display:none;padding-top:4px"></div>
  </div>

  <div class="nav-space"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/main-home.html'">
      <div class="nav-icon">🏠</div><div class="nav-lbl">홈</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/planner-wizard.html'">
      <div class="nav-icon">✦</div><div class="nav-lbl">AI플래너</div>
    </div>
    <div class="nav-item on">
      <div class="nav-icon">✈️</div><div class="nav-lbl" style="color:var(--accent)">항공</div>
    </div>
    <div class="nav-item" onclick="window.location.href='/main-home.html'">
      <div class="nav-icon">🎟</div><div class="nav-lbl">투어</div>
    </div>
  </nav>

</div>

<script>
// ── Params ─────────────────────────────────────────
const SP = new URLSearchParams(location.search);
const ORIGIN      = SP.get('origin')      || 'ICN';
const DESTINATION = SP.get('destination') || 'KIX';
const DEPART_DATE = SP.get('departDate')  || '';
const RETURN_DATE = SP.get('returnDate')  || '';

const ORIGIN_NAME = {ICN:'인천', GMP:'김포', PUS:'김해(부산)', CJU:'제주'};
const DEST_NAME   = {KIX:'오사카(KIX)', FUK:'후쿠오카(FUK)'};

// ── Header ─────────────────────────────────────────
(function initHeader(){
  const oName = ORIGIN_NAME[ORIGIN]      || ORIGIN;
  const dName = DEST_NAME[DESTINATION]   || DESTINATION;
  document.getElementById('hdr-route').textContent = `${oName} → ${dName}`;

  let dateStr = '';
  if (DEPART_DATE) {
    const fmt = d => { const [y,m,day]=d.split('-'); return `${m}.${day}`; };
    dateStr = fmt(DEPART_DATE);
    if (RETURN_DATE) {
      const nights = Math.round((new Date(RETURN_DATE)-new Date(DEPART_DATE))/86400000);
      dateStr += ` ~ ${fmt(RETURN_DATE)} · 왕복 ${nights}박${nights+1}일`;
    }
  }
  document.getElementById('hdr-dates').textContent = dateStr;
})();

// ── Airline colors ──────────────────────────────────
const AIRLINE_COLORS = {
  '에어서울':  '#00A86B', '티웨이항공':'#E53935', '제주항공':  '#FF6B35',
  '진에어':    '#1A237E', '아시아나':  '#C62828', '대한항공':  '#003087',
  '에어부산':  '#0066CC', '이스타항공':'#FF4500',
};
function airlineColor(name) {
  for (const [k, v] of Object.entries(AIRLINE_COLORS)) {
    if (name.includes(k.replace('항공','').replace('에어',''))) return v;
  }
  return '#7B5EA7';
}
function airlineLogo(name, logoUrl) {
  if (logoUrl) {
    return `<img src="${logoUrl}" alt="${name}" style="width:36px;height:36px;border-radius:50%;object-fit:contain;background:#f0f0f0" onerror="this.outerHTML='<div class=\\'airline-logo\\' style=\\'background:${airlineColor(name)}\\'>${name.charAt(0)}</div>'">`;
  }
  return `<div class="airline-logo" style="background:${airlineColor(name)}">${name.charAt(0)}</div>`;
}

// ── Render ──────────────────────────────────────────
let ALL_FLIGHTS = [];
let SORT_MODE   = 'price';

function fmtDur(min) {
  if (!min) return '';
  return `${Math.floor(min/60)}h${min%60 > 0 ? ' ' + (min%60) + 'm' : ''}`;
}

function renderCard(f) {
  const o   = f.outbound;
  const ret = f.inbound;
  const url = (f.reservationUrl || 'https://www.myrealtrip.com/flights').replace(/"/g, '&quot;');
  const cheapBadge  = f.isCheapest ? '<span class="badge badge-cheap">최저가</span>' : '';
  const directBadge = f.isDirect
    ? '<span class="badge badge-direct">직항</span>'
    : '<span class="badge badge-stop">경유</span>';

  const outLeg = o ? `
    <div class="leg-row">
      <span class="leg-time">${o.departTime}</span>
      <div class="leg-line-wrap">
        <div class="leg-line"></div>
        <div class="leg-dur">${fmtDur(o.duration)}</div>
      </div>
      <span class="leg-time">${o.arriveTime}</span>
      <div class="leg-info">
        <span class="leg-airport">${o.origin}→${o.destination}</span>
        ${directBadge}
      </div>
    </div>` : '';

  const inLeg = ret ? `
    <div class="leg-sep"></div>
    <div class="leg-row" style="margin-top:8px">
      <span class="leg-time">${ret.departTime}</span>
      <div class="leg-line-wrap">
        <div class="leg-line"></div>
        <div class="leg-dur">${fmtDur(ret.duration)}</div>
      </div>
      <span class="leg-time">${ret.arriveTime}</span>
      <div class="leg-info">
        <span class="leg-airport">${ret.origin}→${ret.destination}</span>
        ${f.isDirect ? '<span class="badge badge-direct">직항</span>' : '<span class="badge badge-stop">경유</span>'}
      </div>
    </div>` : '';

  return `<div class="flight-item">
    <div class="fi-top">
      ${airlineLogo(f.airline, f.logoUrl)}
      <div style="flex:1">
        <div class="airline-name">${f.airline}</div>
        <div class="fi-badges">${cheapBadge}</div>
      </div>
      <div class="fi-price-wrap">
        <div class="fi-price">${f.price ? f.price.toLocaleString() + '원' : '—'}</div>
        <div class="fi-price-sub">왕복 총액</div>
      </div>
    </div>
    <div class="fi-legs">${outLeg}${inLeg}</div>
    <a class="fi-book" href="${url}" target="_blank">예약하기 →</a>
  </div>`;
}

function sortFlights(mode) {
  SORT_MODE = mode;
  document.getElementById('sort-price').classList.toggle('on', mode === 'price');
  document.getElementById('sort-time').classList.toggle('on', mode === 'time');

  const sorted = [...ALL_FLIGHTS].sort((a, b) => {
    if (mode === 'price') return (a.price || 9999999) - (b.price || 9999999);
    if (mode === 'time') {
      const ta = (a.outbound?.departTime || '').replace(':','');
      const tb = (b.outbound?.departTime || '').replace(':','');
      return ta.localeCompare(tb);
    }
    return 0;
  });

  // cheapest flag
  sorted.forEach((f, i) => { f.isCheapest = (mode === 'price' && i === 0); });

  document.getElementById('flight-list').innerHTML =
    sorted.map(renderCard).join('') +
    `<a href="https://www.myrealtrip.com/flights" target="_blank" class="more-btn">마이리얼트립에서 더 보기 →</a>
     <div class="bottom-space"></div>`;
}

// ── Fetch ───────────────────────────────────────────
async function fetchFlights() {
  try {
    const p = new URLSearchParams({ type:'flights', origin:ORIGIN, destination:DESTINATION });
    if (DEPART_DATE) p.set('departDate', DEPART_DATE);
    if (RETURN_DATE) p.set('returnDate', RETURN_DATE);

    const res  = await fetch('/api/search?' + p);
    const data = await res.json();
    ALL_FLIGHTS = data.flights || [];

    document.getElementById('page-loading').style.display = 'none';
    document.getElementById('flight-list').style.display  = 'block';

    if (!ALL_FLIGHTS.length) {
      document.getElementById('flight-list').innerHTML =
        `<div class="empty-card">
          <div style="font-size:32px;margin-bottom:12px">✈️</div>
          <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px">검색 결과가 없어요</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:20px">날짜나 출발지를 변경해보세요</div>
          <button onclick="history.back()" style="padding:12px 24px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">조건 변경하기</button>
        </div>`;
      document.getElementById('sort-count').textContent = '검색 결과 없음';
      return;
    }

    document.getElementById('sort-count').textContent = `총 ${ALL_FLIGHTS.length}개 항공편`;
    sortFlights('price');

  } catch(e) {
    document.getElementById('page-loading').innerHTML =
      `<div style="text-align:center;padding:32px">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px">데이터를 불러오지 못했어요</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px">${e.message}</div>
        <button onclick="fetchFlights()" style="padding:12px 24px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

fetchFlights();
</script>
</body>
</html>
